<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>占いタイプ？スピリチュアルタイプ？</title>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --mystic: #1a1035;
      --deep: #2d1b5e;
      --mid: #4a2d8f;
      --gold: #e8c96a;
      --gold-light: #f5e4a3;
      --rose: #c97ab0;
      --teal: #7ec8c8;
      --text: #f0e8ff;
      --text-muted: #b8a8d8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--mystic);
      min-height: 100vh;
      color: var(--text);
      padding: 20px 12px 48px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(74,45,143,0.5) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(201,122,176,0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(126,200,200,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .star-dot {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
    }

    @keyframes twinkle {
      0%, 100% { opacity: var(--min, 0.1); transform: scale(1); }
      50% { opacity: var(--max, 0.8); transform: scale(1.3); }
    }

    .container {
      max-width: 540px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      padding: 32px 16px 28px;
    }

    .header-symbol {
      font-size: 36px;
      margin-bottom: 10px;
      display: block;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .header h1 {
      font-family: 'Shippori Mincho', serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: 0.08em;
      line-height: 1.5;
      text-shadow: 0 0 24px rgba(232,201,106,0.4);
    }

    .header-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
      letter-spacing: 0.12em;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 20px;
      padding: 0 2px;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    .progress-track {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--teal), var(--gold));
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .card {
      background: rgba(45,27,94,0.55);
      border: 1px solid rgba(232,201,106,0.18);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .intro-card {
      padding: 20px 18px;
      margin-bottom: 20px;
      line-height: 1.9;
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
    }

    .intro-card strong {
      color: var(--gold-light);
      font-weight: 700;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: linear-gradient(135deg, rgba(74,45,143,0.8), rgba(45,27,94,0.6));
      border: 1px solid rgba(232,201,106,0.25);
      border-radius: 12px;
      font-family: 'Shippori Mincho', serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.06em;
    }

    .question-list {
      display: grid;
      gap: 14px;
      margin-bottom: 24px;
    }

    .question-item {
      padding: 16px 14px;
      transition: border-color 0.3s;
    }

    .question-item.answered {
      border-color: rgba(232,201,106,0.3);
    }

    .question-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }

    .question-number {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--gold), #c9a840);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--mystic);
      margin-top: 1px;
    }

    .question-text {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.7;
      color: var(--text);
    }

    .answer-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .answer-option {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 10px 12px;
      border: 1px solid rgba(184,168,216,0.25);
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.04em;
    }

    .answer-option input { display: none; }

    .answer-option:hover {
      border-color: rgba(232,201,106,0.4);
      background: rgba(232,201,106,0.06);
      color: var(--gold-light);
    }

    .answer-option.selected-yes {
      border-color: var(--rose);
      background: rgba(201,122,176,0.14);
      color: var(--rose);
      font-weight: 700;
      box-shadow: 0 0 12px rgba(201,122,176,0.15);
    }

    .answer-option.selected-no {
      border-color: var(--teal);
      background: rgba(126,200,200,0.12);
      color: var(--teal);
      font-weight: 700;
      box-shadow: 0 0 12px rgba(126,200,200,0.12);
    }

    .submit-button {
      width: 100%;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #c9a840, #e8c96a, #c9a840);
      color: var(--mystic);
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Shippori Mincho', serif;
      letter-spacing: 0.08em;
      box-shadow: 0 4px 20px rgba(232,201,106,0.3);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    }

    .submit-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(232,201,106,0.45);
    }

    .submit-button:disabled {
      opacity: 0.45;
      transform: none;
      cursor: default;
      box-shadow: none;
    }

    .reset-button {
      width: 100%;
      border: 1px solid rgba(232,201,106,0.35);
      border-radius: 999px;
      background: transparent;
      color: var(--gold);
      padding: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.2s;
      letter-spacing: 0.06em;
    }

    .reset-button:hover {
      background: rgba(232,201,106,0.08);
    }

    /* Loading */
    .loading-screen {
      min-height: 360px;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .loading-screen.active { display: flex; }

    .crystal-ball {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.4), rgba(126,200,200,0.3) 30%, rgba(74,45,143,0.6) 70%, rgba(26,16,53,0.8));
      border: 2px solid rgba(232,201,106,0.3);
      box-shadow: 0 0 40px rgba(126,200,200,0.3), inset 0 0 20px rgba(255,255,255,0.05);
      animation: pulse-glow 1.5s ease-in-out infinite;
      margin-bottom: 20px;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 30px rgba(126,200,200,0.2), inset 0 0 20px rgba(255,255,255,0.05); transform: scale(1); }
      50% { box-shadow: 0 0 60px rgba(126,200,200,0.5), 0 0 100px rgba(201,122,176,0.2), inset 0 0 30px rgba(255,255,255,0.1); transform: scale(1.05); }
    }

    .loading-text {
      font-family: 'Shippori Mincho', serif;
      font-size: 15px;
      color: var(--gold);
      letter-spacing: 0.2em;
      animation: fade-text 1.5s ease-in-out infinite;
    }

    @keyframes fade-text {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* Result */
    .result-type-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 20px 22px;
      text-align: center;
    }

    .type-icon {
      font-size: 52px;
      display: block;
      margin-bottom: 8px;
      animation: float 3s ease-in-out infinite;
    }

    .type-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .type-name {
      font-family: 'Shippori Mincho', serif;
      font-size: 26px;
      font-weight: 800;
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .type-name.uranai { color: var(--teal); text-shadow: 0 0 20px rgba(126,200,200,0.4); }
    .type-name.spiri  { color: var(--rose); text-shadow: 0 0 20px rgba(201,122,176,0.4); }
    .type-name.mixed  { color: var(--gold); text-shadow: 0 0 20px rgba(232,201,106,0.4); }

    .score-bar-container {
      padding: 18px 20px;
      margin-bottom: 16px;
    }

    .score-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .score-row:last-child { margin-bottom: 0; }

    .score-label {
      width: 110px;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .score-label.uranai { color: var(--teal); }
    .score-label.spiri  { color: var(--rose); }

    .score-track {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 1s cubic-bezier(0.34,1.56,0.64,1);
    }

    .score-fill.uranai { background: linear-gradient(90deg, #5ab0b0, var(--teal)); }
    .score-fill.spiri  { background: linear-gradient(90deg, #b060a0, var(--rose)); }

    .score-num {
      width: 28px;
      text-align: right;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .score-num.uranai { color: var(--teal); }
    .score-num.spiri  { color: var(--rose); }

    .result-description-card {
      margin: 0 0 16px;
      padding: 20px 18px;
    }

    .result-description {
      font-size: 14px;
      line-height: 2;
      color: var(--text-muted);
    }

    .result-link {
      display: inline-block;
      color: var(--gold);
      text-decoration: underline;
      word-break: break-all;
      font-size: 13px;
      margin-top: 4px;
      transition: opacity 0.2s;
    }

    .result-link:hover { opacity: 0.75; }

    .result-description strong {
      color: var(--gold-light);
      font-weight: 700;
    }

    .answers-summary {
      padding: 18px 16px;
      margin-bottom: 16px;
    }

    .answers-title {
      font-family: 'Shippori Mincho', serif;
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 0.1em;
      margin-bottom: 14px;
    }

    .answer-list { display: grid; gap: 10px; }

    .answer-summary-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12px;
      line-height: 1.7;
      color: var(--text-muted);
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .answer-summary-item:last-child { border-bottom: none; padding-bottom: 0; }

    .answer-q { color: var(--text-muted); flex-shrink: 0; min-width: 24px; }
    .answer-a { font-weight: 700; }
    .answer-a.yes-spiri  { color: var(--rose); }
    .answer-a.yes-uranai { color: var(--teal); }
    .answer-a.no-ans     { color: var(--text-muted); }

    @media (max-width: 480px) {
      .header h1 { font-size: 19px; }
      .answer-group { grid-template-columns: 1fr; }
      .type-name { font-size: 22px; }
      .score-label { width: 90px; font-size: 11px; }
    }
  </style>
</head>
<body>

  <div class="stars" id="starField"></div>

  <div class="container">
    <div class="header">
      <span class="header-symbol">🔮</span>
      <h1>占いタイプ？<br>スピリチュアルタイプ？</h1>
      <p class="header-sub">— あなたの感性を診断します —</p>
    </div>

    <!-- Question Screen -->
    <div id="questionScreen" class="screen active">
      <div class="card intro-card">
        直感で答えてください。<br>
        <strong>10の質問</strong>であなたのタイプがわかります。
      </div>

      <div class="section-label">
        <span>✦</span> 診断テスト
      </div>

      <div class="progress-wrap">
        <div class="progress-info">
          <span>回答進捗</span>
          <span id="progressText">0 / 10</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>

      <div class="question-list" id="questionList"></div>

      <button class="submit-button" id="diagnoseButton" disabled>結果を見る ✦</button>
    </div>

    <!-- Loading Screen -->
    <div id="loadingScreen" class="screen loading-screen">
      <div class="crystal-ball"></div>
      <div class="loading-text">鑑定中…</div>
    </div>

    <!-- Result Screen -->
    <div id="resultScreen" class="screen">
      <div class="card result-type-badge" id="resultBadge">
        <div>
          <span class="type-icon" id="resultIcon"></span>
          <p class="type-label">あなたのタイプ</p>
          <p class="type-name" id="resultTypeName"></p>
        </div>
      </div>

      <div class="card score-bar-container">
        <div class="score-row">
          <span class="score-label uranai">占いタイプ</span>
          <div class="score-track"><div class="score-fill uranai" id="uranaiBar" style="width:0%"></div></div>
          <span class="score-num uranai" id="uranaiNum">0</span>
        </div>
        <div class="score-row">
          <span class="score-label spiri">スピリタイプ</span>
          <div class="score-track"><div class="score-fill spiri" id="spiriBar" style="width:0%"></div></div>
          <span class="score-num spiri" id="spiriNum">0</span>
        </div>
      </div>

      <div class="card result-description-card">
        <div class="result-description" id="resultDescription"></div>
      </div>

      <div class="card answers-summary">
        <p class="answers-title">✦ あなたの回答</p>
        <div class="answer-list" id="answerList"></div>
      </div>

      <button class="submit-button" id="sendButton" style="margin-top:16px;">LINEに送る 📩</button>
      <button class="reset-button" id="resetButton">もう一度診断する</button>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>

  <script>
    // Stars
    (function() {
      const field = document.getElementById('starField');
      for (let i = 0; i < 90; i++) {
        const d = document.createElement('div');
        const size = Math.random() * 2.5 + 0.5;
        d.className = 'star-dot';
        d.style.cssText = `
          width:${size}px; height:${size}px;
          left:${Math.random()*100}%; top:${Math.random()*100}%;
          --d:${(Math.random()*3+2).toFixed(1)}s;
          --delay:-${(Math.random()*5).toFixed(1)}s;
          --min:${(Math.random()*0.15+0.05).toFixed(2)};
          --max:${(Math.random()*0.6+0.3).toFixed(2)};
        `;
        field.appendChild(d);
      }
    })();

    const TOTAL = 10;
    const LIFF_ID = '2010325512-bcfJev7g'; // ← ご自身のLIFF IDに変更してください
    let latestMessage = '';
    let liffReady = false;

    async function initLiff() {
      if (typeof liff === 'undefined') {
        console.error('LIFF SDK未読み込み');
        return false;
      }
      try {
        await liff.init({ liffId: LIFF_ID });
        liffReady = true;
        return true;
      } catch (e) {
        liffReady = false;
        console.error('LIFF初期化失敗:', e.code, e.message);
        alert('初期化エラー: ' + (e.message || e.code || JSON.stringify(e)));
        return false;
      }
    }

    async function sendToLine() {
      if (!latestMessage) { alert('先に診断してください。'); return; }
      const ok = liffReady || await initLiff();
      if (!ok) { alert('LIFFの初期化に失敗しました。LIFF IDまたはエンドポイントURL設定を確認してください。'); return; }
      try {
        if (!liff.isLoggedIn()) { liff.login(); return; }
        if (!liff.isInClient()) { alert('LINEアプリ内で開くと送信できます。'); return; }
        await liff.sendMessages([{ type: 'text', text: latestMessage }]);
        alert('LINEに送信しました');
        liff.closeWindow();
      } catch (e) {
        console.error('送信失敗', e);
        alert('LINE送信に失敗しました: ' + (e.message || e.code || JSON.stringify(e)));
      }
    }

    // YES → which type gets +1
    const questions = [
      { text: '今の自分の「気分や状態」に意識を向けることがある',    yesType: 'spiri' },
      { text: 'なんとなく感じた予感が当たることがある',              yesType: 'spiri' },
      { text: '人と会うと、理由もなく疲れることがある',              yesType: 'spiri' },
      { text: 'イメージや感覚で物事を考えることが多い',              yesType: 'spiri' },
      { text: '出来事の「意味」や「受け取り方」を考えることがある',  yesType: 'spiri' },
      { text: '物事はタイプ別や分類で理解したい',                    yesType: 'uranai' },
      { text: '物事の流れやタイミングを知りたいと思う',              yesType: 'uranai' },
      { text: '白黒はっきりすると安心する',                          yesType: 'uranai' },
      { text: '学ぶときは順序立てて理解したい',                      yesType: 'uranai' },
      { text: '一度納得すると安心して行動できる',                    yesType: 'uranai' },
    ];

    const results = {
      uranai: {
        icon: '⭐',
        name: '占いタイプ',
        className: 'uranai',
        description: `あなたは
<strong>【理解することで力を発揮する占いタイプ】</strong>です。

物事の仕組みや意味が見えると、
一気に安心し、進める力があります。


ここまで読んでいただいて、

「知ることで安心する」

そんなご自身の感覚に、
気づいた方もいるかもしれません。

占いタイプの方は、

「理解すること」

によって、本来の力が開いていきます。

でも本当は、

「知識」だけではなく、

自分自身の感覚

とつながった時に、
読み取る力が一気に深まっていきます。

次回はその入口として、
簡単なワークをやってみましょう✨

___________________________________________

簡単なワークです。

あなたの「誕生霊数」を出してみましょう。

年齢に関係なく、生まれた月日で計算します。

①　生まれた月の数と、日にちの数を足します。

②　足した数をさらに足します。

③　②で出た数の１の位に、２を掛けます。
　　二桁になったら、１の位を取ります。
　　掛けた数が０の時は、１とします。

④　①と②と③を並べた４桁の数が誕生霊数です。

（例）４月３日生まれの人の誕生霊数
①　４＋３＝７　７は一桁なので、07
②　0＋7＝7
③　７×２＝14　一の位は、4
④　0774

（例）10月31日生まれの人の誕生霊数
①　10＋31＝41
②　4＋１＝５
③　５×２＝10　一の位は、0
④　4150

あなたの「誕生霊数」の四桁は、いくつになりましたか？

___________________________________________

あなたの「誕生霊数」の特徴を読んでみましょう。

■ 四桁の意味

1番目：基本的な性格
2番目：生き方・進み方
3番目：結果として現れやすいもの
4番目：無意識に持っている影の数字

■ 数字が持つキーワード

０　直感・無限・チャレンジ・無の境地
１　始まり・独立・開拓・勇気
２　素直さ・調和・感受性・迷い
３　仕事・信念・努力・現実力

    const questionList = document.getElementById('questionList');
    const diagnoseButton = document.getElementById('diagnoseButton');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');

    function renderQuestions() {
      questionList.innerHTML = questions.map((q, i) => `
        <div class="question-item card" id="qi${i}">
          <div class="question-header">
            <div class="question-number">${i + 1}</div>
            <p class="question-text">${q.text}</p>
          </div>
          <div class="answer-group">
            <label class="answer-option" id="opt${i}yes">
              <input type="radio" name="q${i}" value="yes" />
              <span>YES</span>
            </label>
            <label class="answer-option" id="opt${i}no">
              <input type="radio" name="q${i}" value="no" />
              <span>NO</span>
            </label>
          </div>
        </div>
      `).join('');
    }

    function updateProgress() {
      let answered = 0;
      questions.forEach((_, i) => {
        if (document.querySelector(`input[name="q${i}"]:checked`)) answered++;
      });
      progressFill.style.width = `${(answered / TOTAL) * 100}%`;
      progressText.textContent = `${answered} / ${TOTAL}`;
      diagnoseButton.disabled = answered < TOTAL;
    }

    function syncStyles(name, value) {
      const i = parseInt(name.replace('q', ''));
      const yesLabel = document.getElementById(`opt${i}yes`);
      const noLabel  = document.getElementById(`opt${i}no`);

      yesLabel.classList.remove('selected-yes', 'selected-no');
      noLabel.classList.remove('selected-yes', 'selected-no');

      if (value === 'yes') yesLabel.classList.add('selected-yes');
      if (value === 'no')  noLabel.classList.add('selected-no');

      document.getElementById(`qi${i}`).classList.add('answered');
    }

    document.addEventListener('change', e => {
      if (e.target.matches('input[type="radio"]')) {
        syncStyles(e.target.name, e.target.value);
        updateProgress();
      }
    });

    function showScreen(id) {
      ['questionScreen','loadingScreen','resultScreen'].forEach(s => {
        document.getElementById(s).classList.remove('active');
      });
      document.getElementById(id).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    diagnoseButton.addEventListener('click', () => {
      const answers = questions.map((_, i) => {
        const sel = document.querySelector(`input[name="q${i}"]:checked`);
        return sel ? sel.value : null;
      });

      if (answers.includes(null)) {
        alert('すべての質問に回答してください。');
        return;
      }

      showScreen('loadingScreen');

      setTimeout(() => {
        let uranai = 0, spiri = 0;
        answers.forEach((ans, i) => {
          const yesType = questions[i].yesType;
          const noType  = yesType === 'spiri' ? 'uranai' : 'spiri';
          if (ans === 'yes') {
            if (yesType === 'spiri') spiri++; else uranai++;
          } else {
            if (noType === 'spiri') spiri++; else uranai++;
          }
        });

        let type;
        if (uranai === spiri) type = 'mixed';
        else if (uranai > spiri) type = 'uranai';
        else type = 'spiri';

        const r = results[type];
        document.getElementById('resultIcon').textContent = r.icon;
        document.getElementById('resultTypeName').textContent = r.name;
        document.getElementById('resultTypeName').className = `type-name ${r.className}`;

        document.getElementById('resultDescription').innerHTML =
          r.description.replace(/\n/g, '<br>');

        document.getElementById('uranaiNum').textContent = uranai;
        document.getElementById('spiriNum').textContent = spiri;

        // Answer summary
        document.getElementById('answerList').innerHTML = questions.map((q, i) => {
          const ans = answers[i];
          const isYes = ans === 'yes';
          const typeGained = isYes ? q.yesType : (q.yesType === 'spiri' ? 'uranai' : 'spiri');
          let aClass = 'no-ans';
          let aLabel = isYes ? 'YES' : 'NO';
          if (typeGained === 'spiri')  { aClass = 'yes-spiri';  aLabel += ' 🌙'; }
          if (typeGained === 'uranai') { aClass = 'yes-uranai'; aLabel += ' ⭐'; }

          return `<div class="answer-summary-item">
            <span class="answer-q">Q${i+1}.</span>
            <div>
              <span>${q.text}</span><br>
              <span class="answer-a ${aClass}">${aLabel}</span>
            </div>
          </div>`;
        }).join('');

        // Build LINE message
        const answerText = questions.map((q, i) => {
          const ans = answers[i];
          const isYes = ans === 'yes';
          const typeGained = isYes ? q.yesType : (q.yesType === 'spiri' ? 'uranai' : 'spiri');
          const icon = typeGained === 'spiri' ? '🌙' : '⭐';
          return `Q${i+1}. ${q.text}\n→ ${isYes ? 'YES' : 'NO'} ${icon}`;
        }).join('\n\n');

        const plainDesc = r.description.replace(/<[^>]+>/g, '');
        latestMessage = `≪占いタイプ？スピリチュアルタイプ？≫

【あなたの回答】
${answerText}

【スコア】
占いタイプ：${uranai}点
スピリタイプ：${spiri}点

【判定結果】
${r.name}

${plainDesc}`;

        showScreen('resultScreen');

        requestAnimationFrame(() => {
          setTimeout(() => {
            document.getElementById('uranaiBar').style.width = `${(uranai / TOTAL) * 100}%`;
            document.getElementById('spiriBar').style.width  = `${(spiri  / TOTAL) * 100}%`;
          }, 200);
        });
      }, 1500);
    });

    document.getElementById('sendButton').addEventListener('click', sendToLine);

    document.getElementById('resetButton').addEventListener('click', () => {
      document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
      document.querySelectorAll('.answer-option').forEach(l => {
        l.classList.remove('selected-yes', 'selected-no');
      });
      document.querySelectorAll('.question-item').forEach(el => el.classList.remove('answered'));
      document.getElementById('uranaiBar').style.width = '0%';
      document.getElementById('spiriBar').style.width  = '0%';
      latestMessage = '';
      updateProgress();
      showScreen('questionScreen');
    });

    renderQuestions();
    updateProgress();
    window.addEventListener('load', initLiff);
  </script>
